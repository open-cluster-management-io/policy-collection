# 3. Validating Admission Policy (VAP) - ENFORCE
object-templates-raw: |
  - complianceType: musthave
    objectDefinition:
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicy
      metadata:
        name: operator-guardrails-vap
      spec:
        failurePolicy: Ignore
        matchConstraints:
          resourceRules:
          - apiGroups: ["operators.coreos.com"]
            apiVersions: ["v1alpha1"]
            operations: ["CREATE", "UPDATE"]
            resources: ["subscriptions"]
        matchConditions:
        - name: has-spec-name
          expression: "has(object.spec) && has(object.spec.name)"
        variables:
        - name: operatorName
          expression: "object.spec.name"
        # Dynamically inject the Hub lists into the CEL expression
        - name: allowedPackages
          expression: "'{{hub fromConfigMap "policies" "operator-allowlist" "packages" | default "" hub}}'.split(',').filter(p, p != '')"
        - name: deniedPackages
          expression: "'{{hub fromConfigMap "policies" "operator-denylist" "packages" | default "" hub}}'.split(',').filter(p, p != '')"
        validations:
        # Default Deny Logic: Must be IN allowlist AND NOT IN denylist
        - expression: "variables.allowedPackages.exists(p, p.trim() == variables.operatorName) && !variables.deniedPackages.exists(p, p.trim() == variables.operatorName)"
          messageExpression: "'The operator \"' + variables.operatorName + '\" is either not on the allowlist or is explicitly denied.'"

  - complianceType: musthave
    objectDefinition:
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicyBinding
      metadata:
        name: operator-guardrails-vap-binding
      spec:
        policyName: operator-guardrails-vap
        validationActions: ["Warn"]
        matchResources:
          namespaceSelector: {}
