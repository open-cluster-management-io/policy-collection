apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: operator-guardrails
# Explicit placement binding name to avoid the missing metadata.name error
placementBindingDefaults:
  name: "operator-guardrails-binding"
policyDefaults:
  namespace: policies
  consolidateManifests: false
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  # This default is inform and can be overwritten for any policy you add see below
  remediationAction: inform
  # Set the interval globally for all policies generated by this file
  evaluationInterval:
    compliant: 12h      # Poll every 12 hours if compliant
    noncompliant: 1h    # Poll every 1 hour if non-compliant
  severity: critical
  standards:
    - NIST SP 800-53
  policySets:
    - operator-guardrails
policies:
  # This policy explicitly uses 'inform' to protect the audit policy
  - name: audit-operator-guardrails-inform
    remediationAction: inform
    manifests:
      - path: input/auditoperators/auditpolicy.yaml

  # This policy can enforce the supporting configurations
  - name: audit-operator-guardrails-enforce
    remediationAction: enforce
    manifests:
      - path: input/auditoperators/configmaps.yaml
      - path: input/auditoperators/vap.yaml
policySets:
  - name: operator-guardrails
    description: operator-guardrails
    placement:
      placementPath: placement.yaml
