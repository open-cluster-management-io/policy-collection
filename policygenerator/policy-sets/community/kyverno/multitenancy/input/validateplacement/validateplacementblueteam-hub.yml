# WARNING: ClusterPolicy was DEPRECATED in Kyverno v1.17
# To update your policy, browse the official Kyverno policy collection
# for current examples: https://kyverno.io/policies

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-placement-blueteam
spec:
  validationFailureAction: enforce
  background: false
  rules:
    - name: restrict-to-argoproject
      match:
        resources:
          kinds:
            - Placement
        subjects:
          - kind: Group
            name: blue-sre-group
      validate:
        message: "For any `blue-sre-group` member, creation of Placement must be bound to its clusterset"
        pattern:
          spec:
            clusterSets:
              - blueteam
