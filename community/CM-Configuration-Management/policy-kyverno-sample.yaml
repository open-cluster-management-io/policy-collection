# WARNING: ClusterPolicy was DEPRECATED in Kyverno v1.17
# To update your policy, browse the official Kyverno policy collection 
# for current examples: https://kyverno.io/policies
# Then convert the Kyverno manifest to an OCM policy with the Policy Generator plugin

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-kyverno-sample
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: policy-kyverno-sample
        spec:
          remediationAction: inform
          severity: low
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: kyverno.io/v1
                kind: ClusterPolicy
                metadata:
                  name: require-labels
                spec:
                  validationFailureAction: enforce
                  rules:
                    - name: check-for-labels
                      match:
                        resources:
                          kinds:
                            - Pod
                      validate:
                        message: "label `app.kubernetes.io/name` is required"
                        pattern:
                          metadata:
                            labels:
                              app.kubernetes.io/name: "?*"
